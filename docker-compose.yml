# BOMOps Docker Compose 設定（開発用）
services:
  # PostgreSQL データベース
  db:
    image: postgres:16-alpine
    container_name: bomops-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bomops}
      POSTGRES_USER: ${POSTGRES_USER:-bomops}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bomops}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bomops} -d ${POSTGRES_DB:-bomops}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Django アプリケーション
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bomops-web
    command: >
      sh -c "
        python bomops_core/manage.py migrate &&
        python bomops_core/manage.py runserver 0.0.0.0:8000
      "
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:-django-insecure-dev-key-change-in-production}
      - DJANGO_DEBUG=${DJANGO_DEBUG:-True}
      - POSTGRES_DB=${POSTGRES_DB:-bomops}
      - POSTGRES_USER=${POSTGRES_USER:-bomops}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-bomops}
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
