components:
  schemas:
    BssSet:
      type: object
      description: BSSセットシリアライザ
      properties:
        id:
          type: integer
          readOnly: true
        set_code:
          type: string
          title: セットコード
          description: '例: BST-2025-0010'
          maxLength: 50
        product_model:
          type: integer
          title: 製品モデル
          description: どのBOMで組んだか
        product_model_code:
          type: string
          readOnly: true
        product_model_name:
          type: string
          readOnly: true
        status:
          allOf:
          - $ref: '#/components/schemas/BssSetStatusEnum'
          title: ステータス
        status_display:
          type: string
          readOnly: true
        customer_site:
          type: integer
          nullable: true
          title: 設置拠点
        customer_site_name:
          type: string
          readOnly: true
        customer_name:
          type: string
          readOnly: true
        installed_at:
          type: string
          format: date-time
          nullable: true
          title: 設置日時
        removed_at:
          type: string
          format: date-time
          nullable: true
          title: 撤去日時
        note:
          type: string
          nullable: true
          title: 備考
        components_count:
          type: integer
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
          title: 作成日時
        updated_at:
          type: string
          format: date-time
          readOnly: true
          title: 更新日時
      required:
      - components_count
      - created_at
      - customer_name
      - customer_site_name
      - id
      - product_model
      - product_model_code
      - product_model_name
      - set_code
      - status_display
      - updated_at
    BssSetComponent:
      type: object
      description: BSSセット構成部品シリアライザ
      properties:
        id:
          type: integer
          readOnly: true
        bss_set:
          type: integer
          title: BSSセット
        set_code:
          type: string
          readOnly: true
        part_unit:
          type: integer
          title: 部品実物
        serial_number:
          type: string
          readOnly: true
        part_code:
          type: string
          readOnly: true
        part_name:
          type: string
          readOnly: true
        role:
          type: string
          nullable: true
          title: 役割
          description: '例: MAIN_PC, CAMERA1, PAYMENT'
          maxLength: 50
        mounted_at:
          type: string
          format: date-time
          nullable: true
          title: 搭載日時
        unmounted_at:
          type: string
          format: date-time
          nullable: true
          title: 取り外し日時
        is_mounted:
          type: boolean
          readOnly: true
        note:
          type: string
          nullable: true
          title: 備考
        created_at:
          type: string
          format: date-time
          readOnly: true
          title: 作成日時
        updated_at:
          type: string
          format: date-time
          readOnly: true
          title: 更新日時
      required:
      - bss_set
      - created_at
      - id
      - is_mounted
      - part_code
      - part_name
      - part_unit
      - serial_number
      - set_code
      - updated_at
    BssSetComponentRequest:
      type: object
      description: BSSセット構成部品シリアライザ
      properties:
        bss_set:
          type: integer
          title: BSSセット
        part_unit:
          type: integer
          title: 部品実物
        role:
          type: string
          nullable: true
          title: 役割
          description: '例: MAIN_PC, CAMERA1, PAYMENT'
          maxLength: 50
        mounted_at:
          type: string
          format: date-time
          nullable: true
          title: 搭載日時
        unmounted_at:
          type: string
          format: date-time
          nullable: true
          title: 取り外し日時
        note:
          type: string
          nullable: true
          title: 備考
      required:
      - bss_set
      - part_unit
    BssSetComposition:
      type: object
      description: セット構成ビュー用シリアライザ（読み取り専用）
      properties:
        set_id:
          type: integer
        set_code:
          type: string
        product_model:
          type: string
        components:
          type: array
          items:
            $ref: '#/components/schemas/ComponentDetail'
      required:
      - components
      - product_model
      - set_code
      - set_id
    BssSetConfig:
      type: object
      description: BSSセット設定シリアライザ
      properties:
        id:
          type: integer
          readOnly: true
        bss_set:
          type: integer
          title: BSSセット
        set_code:
          type: string
          readOnly: true
        config_group:
          type: string
          title: 設定グループ
          description: '例: POS, PAYPAY, NETWORK, SYSTEM'
          maxLength: 50
        key:
          type: string
          title: 設定キー
          description: '例: paypay_merchant_id, pos_store_id'
          maxLength: 100
        value:
          type: string
          nullable: true
          title: 設定値
        masked_value:
          type: string
          nullable: true
          description: 秘匿情報の場合はマスクした値を返す
          readOnly: true
        value_json:
          nullable: true
          title: 設定値(JSON)
          description: 複雑な設定を入れる場所
        is_secret:
          type: boolean
          title: 秘匿情報
          description: APIキーなど秘匿情報の場合はTrue
        valid_from:
          type: string
          format: date-time
          nullable: true
          title: 有効開始日時
        valid_to:
          type: string
          format: date-time
          nullable: true
          title: 有効終了日時
        is_valid:
          type: boolean
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
          title: 作成日時
        updated_at:
          type: string
          format: date-time
          readOnly: true
          title: 更新日時
      required:
      - bss_set
      - config_group
      - created_at
      - id
      - is_valid
      - key
      - masked_value
      - set_code
      - updated_at
    BssSetConfigRequest:
      type: object
      description: BSSセット設定シリアライザ
      properties:
        bss_set:
          type: integer
          title: BSSセット
        config_group:
          type: string
          minLength: 1
          title: 設定グループ
          description: '例: POS, PAYPAY, NETWORK, SYSTEM'
          maxLength: 50
        key:
          type: string
          minLength: 1
          title: 設定キー
          description: '例: paypay_merchant_id, pos_store_id'
          maxLength: 100
        value:
          type: string
          nullable: true
          title: 設定値
        value_json:
          nullable: true
          title: 設定値(JSON)
          description: 複雑な設定を入れる場所
        is_secret:
          type: boolean
          title: 秘匿情報
          description: APIキーなど秘匿情報の場合はTrue
        valid_from:
          type: string
          format: date-time
          nullable: true
          title: 有効開始日時
        valid_to:
          type: string
          format: date-time
          nullable: true
          title: 有効終了日時
      required:
      - bss_set
      - config_group
      - key
    BssSetRequest:
      type: object
      description: BSSセットシリアライザ
      properties:
        set_code:
          type: string
          minLength: 1
          title: セットコード
          description: '例: BST-2025-0010'
          maxLength: 50
        product_model:
          type: integer
          title: 製品モデル
          description: どのBOMで組んだか
        status:
          allOf:
          - $ref: '#/components/schemas/BssSetStatusEnum'
          title: ステータス
        customer_site:
          type: integer
          nullable: true
          title: 設置拠点
        installed_at:
          type: string
          format: date-time
          nullable: true
          title: 設置日時
        removed_at:
          type: string
          format: date-time
          nullable: true
          title: 撤去日時
        note:
          type: string
          nullable: true
          title: 備考
      required:
      - product_model
      - set_code
    BssSetStatusEnum:
      enum:
      - ASSEMBLED
      - INSTALLED
      - REPAIR
      - RECOVERED
      - SCRAPPED
      type: string
      description: |-
        * `ASSEMBLED` - 組立完了
        * `INSTALLED` - 設置済
        * `REPAIR` - 修理中
        * `RECOVERED` - 回収済
        * `SCRAPPED` - 廃棄
    ComponentDetail:
      type: object
      description: セット構成詳細用シリアライザ（読み取り専用）
      properties:
        role:
          type: string
        part_code:
          type: string
        serial_number:
          type: string
      required:
      - part_code
      - role
      - serial_number
    Customer:
      type: object
      description: 顧客シリアライザ
      properties:
        id:
          type: integer
          readOnly: true
        code:
          type: string
          title: 顧客コード
          maxLength: 50
        name:
          type: string
          title: 顧客名
          maxLength: 200
        contact_person:
          type: string
          nullable: true
          title: 担当者名
          maxLength: 100
        contact_email:
          type: string
          format: email
          nullable: true
          title: 連絡先メール
          maxLength: 254
        contact_tel:
          type: string
          nullable: true
          title: 連絡先電話番号
          maxLength: 20
        note:
          type: string
          nullable: true
          title: 備考
        sites_count:
          type: integer
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
          title: 作成日時
        updated_at:
          type: string
          format: date-time
          readOnly: true
          title: 更新日時
      required:
      - code
      - created_at
      - id
      - name
      - sites_count
      - updated_at
    CustomerRequest:
      type: object
      description: 顧客シリアライザ
      properties:
        code:
          type: string
          minLength: 1
          title: 顧客コード
          maxLength: 50
        name:
